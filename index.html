<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sethlist — Concert & Poster Journey</title>
<meta name="description" content="A lifetime of live music — concerts, venues, setlists, and a poster collection from the era of digital ticket stubs." />

<!-- Canonical URL (single-page site; the one real canonical entry is root) -->
<link rel="canonical" href="https://sethlist.live/" />

<!-- Open Graph — for sharing previews in iMessage, Slack, LinkedIn, Facebook, etc.
     Note: og:image must be a raster format (PNG/JPG). Facebook & most other
     platforms don't support SVG and will report "Bad Response Code" if served one. -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Sethlist" />
<meta property="og:title" content="Sethlist — Concert & Poster Journey" />
<meta property="og:description" content="A lifetime of live music — concerts, venues, setlists, and a poster collection from the era of digital ticket stubs." />
<meta property="og:url" content="https://sethlist.live/" />
<meta property="og:image" content="https://sethlist.live/og-image.png" />
<meta property="og:image:type" content="image/png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Sethlist — A SethTime of live music" />

<!-- Twitter card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Sethlist — Concert & Poster Journey" />
<meta name="twitter:description" content="A lifetime of live music — concerts, venues, setlists, and a poster collection." />
<meta name="twitter:image" content="https://sethlist.live/og-image.png" />

<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<!-- Fonts: gig-poster display + readable serif body -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Big+Shoulders+Display:wght@700;900&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

<!-- D3 for the US map (vendored locally for offline/GitHub Pages reliability) -->
<script src="vendor/d3.min.js"></script>
<script src="vendor/topojson-client.min.js"></script>

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- Noise overlay for texture -->
<div class="noise" aria-hidden="true"></div>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="#/timeline" aria-label="Sethlist — home">
      <div class="brand-mark">SL</div>
      <div class="brand-text">
        <h1>Set<span class="brand-h">h</span>list</h1>
        <p class="brand-tagline">A Set<span class="brand-h-tagline">h</span><span class="sethtime-time">Time</span> of live music</p>
        <p class="brand-sub" id="brand-sub">loading…</p>
      </div>
    </a>
    <nav class="main-nav" role="navigation">
      <a href="#/timeline" data-view="timeline">Timeline</a>
      <a href="#/map" data-view="map">Map</a>
      <a href="#/posters" data-view="posters">Posters</a>
      <a href="#/songs" data-view="songs">Songs</a>
      <a href="#/stats" data-view="stats">Stats</a>
      <a href="#/about" data-view="about">About</a>
    </nav>
  </div>
</header>

<main id="app">
  <div class="loading">Loading your journey…</div>
</main>

<footer class="site-footer">
  <span>Built from a couple of spreadsheets and a lot of live music.</span>
</footer>

<!-- Modal for concert/poster details -->
<div class="modal-backdrop" id="modal" hidden>
  <div class="modal-card" role="dialog" aria-modal="true">
    <button class="modal-close" aria-label="Close">×</button>
    <div class="modal-body"></div>
  </div>
</div>

<script src="cities.js"></script>
<script src="app.js"></script>
</body>
</html>
