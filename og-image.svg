<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sethlist Open Graph share image — 1200x630, the standard size for social previews.
  Intentionally simple: matches the site's design tokens (deep ink background,
  cream paper text, accent red). No personal data.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle diagonal stripe accent in corner -->
  <g opacity="0.06">
    <rect x="-100" y="-100" width="600" height="20" fill="#f2e9d8" transform="rotate(-25 100 100)"/>
    <rect x="-100" y="-50" width="600" height="20" fill="#f2e9d8" transform="rotate(-25 100 100)"/>
  </g>

  <!-- Accent stripe on right edge -->
  <rect x="1160" y="0" width="40" height="630" fill="#d93b2b"/>

  <!-- "SL" monogram -->
  <g transform="translate(80, 140)">
    <rect width="100" height="100" fill="#d93b2b"/>
    <text x="50" y="72" font-family="Georgia, 'Times New Roman', serif"
          font-size="52" font-weight="900" fill="#f2e9d8"
          text-anchor="middle">SL</text>
  </g>

  <!-- Brand name (stacked display treatment) -->
  <text x="80" y="350" font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="900" fill="#f2e9d8"
        letter-spacing="-4">Sethlist</text>

  <!-- Tagline -->
  <text x="80" y="410" font-family="'Courier New', monospace"
        font-size="26" fill="#d93b2b"
        letter-spacing="4">A SethTime of live music</text>

  <!-- Meta chips -->
  <g transform="translate(80, 480)" font-family="'Courier New', monospace"
     font-size="18" fill="#888" letter-spacing="3">
    <text x="0" y="0">CONCERTS · POSTERS · SETLISTS · VENUES</text>
  </g>

  <!-- URL footer -->
  <text x="80" y="570" font-family="'Courier New', monospace"
        font-size="22" fill="#f2e9d8" letter-spacing="3">sethlist.live</text>
</svg>
